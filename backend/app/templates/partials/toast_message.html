<div
    x-data="{ show: true }"
    x-show="show"
    x-init="setTimeout(() => show = false, 4000)"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-x-8"
    x-transition:enter-end="opacity-100 translate-x-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 translate-x-0"
    x-transition:leave-end="opacity-0 translate-x-8"
    class="flex items-center gap-3 rounded-lg px-4 py-3 shadow-lg text-sm font-medium
           {% if type == 'error' %}bg-red-600 text-white
           {% elif type == 'warning' %}bg-yellow-500 text-white
           {% elif type == 'info' %}bg-blue-600 text-white
           {% else %}bg-green-600 text-white{% endif %}">
    {% if type == 'error' %}
    <i data-lucide="x-circle" class="h-4 w-4 flex-shrink-0"></i>
    {% elif type == 'warning' %}
    <i data-lucide="alert-triangle" class="h-4 w-4 flex-shrink-0"></i>
    {% else %}
    <i data-lucide="check-circle" class="h-4 w-4 flex-shrink-0"></i>
    {% endif %}
    <span>{{ message }}</span>
    <button @click="show = false" class="ml-auto opacity-75 hover:opacity-100">
        <i data-lucide="x" class="h-3 w-3"></i>
    </button>
</div>
