{% extends "base/authenticated.html" %}

{% block title %}Novo Usuário — Gestão SAC{% endblock %}

{% block page_content %}
<div class="mx-auto max-w-xl space-y-6">

    <!-- Header -->
    <div class="flex items-center gap-3">
        <a href="/usuarios" class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>
            Voltar
        </a>
        <span class="text-gray-300">/</span>
        <h2 class="text-xl font-bold text-gray-900">Novo Usuário</h2>
    </div>

    {% if erro %}
    <div class="flex items-center gap-2 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <i data-lucide="alert-circle" class="h-4 w-4 flex-shrink-0"></i>
        <span>{{ erro }}</span>
    </div>
    {% endif %}

    <form action="/usuarios" method="post" class="space-y-5">
        <div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm space-y-4">

            <div>
                <label for="nome" class="block text-sm font-medium text-gray-700 mb-1.5">
                    Nome Completo <span class="text-red-500">*</span>
                </label>
                <input
                    id="nome"
                    name="nome"
                    type="text"
                    required
                    placeholder="Ex: João da Silva"
                    class="w-full rounded-lg border border-gray-300 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"
                />
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
                    E-mail <span class="text-red-500">*</span>
                </label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    required
                    placeholder="joao@empresa.com"
                    class="w-full rounded-lg border border-gray-300 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"
                />
            </div>

            <div>
                <label for="senha" class="block text-sm font-medium text-gray-700 mb-1.5">
                    Senha <span class="text-red-500">*</span>
                </label>
                <input
                    id="senha"
                    name="senha"
                    type="password"
                    required
                    placeholder="Mínimo 6 caracteres"
                    class="w-full rounded-lg border border-gray-300 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"
                />
            </div>

            <div>
                <label for="papel" class="block text-sm font-medium text-gray-700 mb-1.5">
                    Papel <span class="text-red-500">*</span>
                </label>
                <select
                    id="papel"
                    name="papel"
                    required
                    class="w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm text-gray-700 transition focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200">
                    {% for p in papeis %}
                    <option value="{{ p.value }}">{% if p.value == 'GERENTE' %}Gerente{% else %}Operador{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="flex items-center justify-end gap-3">
            <a href="/usuarios"
               class="inline-flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-600 transition hover:bg-gray-50">
                Cancelar
            </a>
            <button
                type="submit"
                class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                <i data-lucide="user-plus" class="h-4 w-4"></i>
                Criar Usuário
            </button>
        </div>
    </form>

</div>
{% endblock %}
